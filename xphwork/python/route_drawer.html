<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>无人机航线绘制工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { display: flex; height: 100vh; }
        #map { flex: 1; background: #e8f4f8; position: relative; }
        canvas { display: block; cursor: crosshair; }
        .sidebar {
            width: 350px;
            background: white;
            padding: 15px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        h1 { font-size: 16px; color: #333; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: #666; margin-bottom: 10px; }
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin: 3px;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn:hover { opacity: 0.8; }
        .panel {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .panel h3 { font-size: 12px; margin-bottom: 8px; }
        .info-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 11px; }
        .route-list { max-height: 300px; overflow-y: auto; }
        .route-item {
            padding: 8px;
            margin: 4px 0;
            background: white;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #ddd;
            cursor: pointer;
        }
        .route-item:hover { border-color: #3498db; }
        .route-item.selected { border-color: #e74c3c; background: #fff5f5; }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            display: none;
            z-index: 100;
        }
        .legend-item { display: flex; align-items: center; margin: 4px 0; font-size: 11px; }
        .legend-color { width: 12px; height: 12px; margin-right: 6px; border-radius: 50%; }
        .legend-line { width: 20px; height: 3px; margin-right: 6px; }
        .mode-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map">
            <canvas id="canvas"></canvas>
            <div class="tooltip" id="tooltip"></div>
            <div class="mode-indicator" id="mode-indicator">绘制模式</div>
        </div>
        <div class="sidebar">
            <h1>🗺️ 无人机航线绘制工具</h1>
            <p class="subtitle">在卫星图上手动绘制飞行路线</p>

            <div class="panel">
                <h3>🎯 工具</h3>
                <button class="btn btn-success" onclick="startAutoMode()">🚀 自动画全部</button>
                <button class="btn btn-primary" id="btn-node" onclick="setMode('node')">🔗 手动连线</button>
                <button class="btn btn-primary" id="btn-draw" onclick="setMode('draw')">✏️ 自由绘制</button>
                <button class="btn btn-danger" id="btn-delete" onclick="setMode('delete')">🗑️ 删除</button>
                <button class="btn btn-warning" onclick="saveRoutes()">💾 保存</button>
                <button class="btn" onclick="clearAll()">🔄 清空</button>
            </div>

            <div class="panel" id="auto-panel" style="display:none;">
                <h3>🚀 自动模式</h3>
                <div id="auto-info"></div>
                <div style="margin-top:8px;">
                    <button class="btn btn-success" onclick="confirmRoute()">✅ 确认</button>
                    <button class="btn btn-warning" onclick="resetCurrentPath()">🔄 重置</button>
                    <button class="btn btn-warning" onclick="skipRoute()">⏭️ 跳过</button>
                    <button class="btn btn-danger" onclick="stopAutoMode()">⏹️ 停止</button>
                </div>
            </div>

            <div class="panel">
                <h3>📊 当前路线</h3>
                <div id="current-route-info">
                    <p style="color:#999; font-size:11px;">点击"绘制模式"开始画线</p>
                </div>
            </div>

            <div class="panel">
                <h3>📋 已保存路线</h3>
                <div class="route-list" id="route-list">
                    <p style="color:#999; font-size:11px;">暂无路线</p>
                </div>
            </div>

            <div class="panel">
                <h3>📍 图例</h3>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e74c3c;"></div>
                    <span>起降点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f39c12;"></div>
                    <span>取货点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ecc71;"></div>
                    <span>配送点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: #ff6b6b;"></div>
                    <span>已绘制路线</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: #ffd93d;"></div>
                    <span>正在绘制</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    var nodes = {
        'DEP_W': {lat:22.8012, lon:113.9456, name:'西区起降点', type:'depot'},
        'DEP_E': {lat:22.8053, lon:113.9534, name:'东区起降点', type:'depot'},
        'CANTEEN_W': {lat:22.8004, lon:113.9411, name:'西园食堂', type:'pickup'},
        'CANTEEN_E': {lat:22.8041, lon:113.9572, name:'东园食堂', type:'pickup'},
        'RESTAURANT_X': {lat:22.8021, lon:113.9483, name:'相山餐厅', type:'pickup'},
        'GATE_S': {lat:22.8025, lon:113.9562, name:'南门服务点', type:'pickup'},
        'DORM_W': {lat:22.8020, lon:113.9401, name:'西园宿舍区', type:'delivery'},
        'DORM_E': {lat:22.8053, lon:113.9592, name:'东园宿舍区', type:'delivery'},
        'LIB': {lat:22.8051, lon:113.9493, name:'图书馆学习区', type:'delivery'}
    };

    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var tooltip = document.getElementById('tooltip');
    var modeIndicator = document.getElementById('mode-indicator');

    var tileImage = new Image();
    var tileLoaded = false;
    var tileBounds = {xMin:0, xMax:0, yMin:0, yMax:0, zoom:16};
    var padding = 50;

    var mode = 'view'; // 'view', 'node', 'draw', 'delete'
    var routes = []; // 已保存的路线
    var currentPath = []; // 正在绘制的路径点
    var selectedRoute = -1;
    var selectedNodes = []; // 节点连线模式选中的节点

    // 加载卫星底图
    function loadTile() {
        var zoom = 16;
        var n = Math.pow(2, zoom);
        var xMin = Math.floor((113.938 + 180) / 360 * n);
        var xMax = Math.floor((113.962 + 180) / 360 * n);
        var yMin = Math.floor((1 - Math.log(Math.tan(22.810 * Math.PI / 180) + 1 / Math.cos(22.810 * Math.PI / 180)) / Math.PI) / 2 * n);
        var yMax = Math.floor((1 - Math.log(Math.tan(22.796 * Math.PI / 180) + 1 / Math.cos(22.796 * Math.PI / 180)) / Math.PI) / 2 * n);

        tileBounds = {xMin: xMin, xMax: xMax, yMin: yMin, yMax: yMax, zoom: zoom};

        var tiles = [];
        for (var x = xMin; x <= xMax; x++) {
            for (var y = yMin; y <= yMax; y++) {
                tiles.push({x: x, y: y});
            }
        }

        var loaded = 0;
        var tileCanvas = document.createElement('canvas');
        tileCanvas.width = 256 * (xMax - xMin + 1);
        tileCanvas.height = 256 * (yMax - yMin + 1);
        var tileCtx = tileCanvas.getContext('2d');

        tiles.forEach(function(t) {
            var img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                tileCtx.drawImage(img, (t.x - xMin) * 256, (t.y - yMin) * 256);
                loaded++;
                if (loaded === tiles.length) {
                    tileImage.src = tileCanvas.toDataURL();
                    tileLoaded = true;
                    draw();
                }
            };
            img.onerror = function() { loaded++; if (loaded === tiles.length) draw(); };
            img.src = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/' + zoom + '/' + t.y + '/' + t.x;
        });
    }

    function resize() {
        var container = document.getElementById('map');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        if (!tileLoaded) loadTile();
        draw();
    }

    function latLonToPixel(lat, lon) {
        var n = Math.pow(2, tileBounds.zoom);
        var xtile = (lon + 180) / 360 * n;
        var ytile = (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n;
        var px = padding + (xtile - tileBounds.xMin) / (tileBounds.xMax - tileBounds.xMin + 1) * (canvas.width - 2 * padding);
        var py = padding + (ytile - tileBounds.yMin) / (tileBounds.yMax - tileBounds.yMin + 1) * (canvas.height - 2 * padding);
        return {x: px, y: py};
    }

    function pixelToLatLon(px, py) {
        var n = Math.pow(2, tileBounds.zoom);
        var xtile = tileBounds.xMin + (px - padding) / (canvas.width - 2 * padding) * (tileBounds.xMax - tileBounds.xMin + 1);
        var ytile = tileBounds.yMin + (py - padding) / (canvas.height - 2 * padding) * (tileBounds.yMax - tileBounds.yMin + 1);
        var lon = xtile / n * 360 - 180;
        var lat = Math.atan(Math.sinh(Math.PI * (1 - 2 * ytile / n))) * 180 / Math.PI;
        return {lat: lat, lon: lon};
    }

    function draw() {
        if (tileLoaded) {
            ctx.drawImage(tileImage, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = '#e8f4f8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 绘制已保存的路线
        routes.forEach(function(route, idx) {
            if (route.points.length < 2) return;
            ctx.strokeStyle = idx === selectedRoute ? '#ff0000' : '#ff6b6b';
            ctx.lineWidth = idx === selectedRoute ? 4 : 3;
            ctx.beginPath();
            var first = latLonToPixel(route.points[0].lat, route.points[0].lon);
            ctx.moveTo(first.x, first.y);
            for (var i = 1; i < route.points.length; i++) {
                var pt = latLonToPixel(route.points[i].lat, route.points[i].lon);
                ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // 绘制路线标签
            var mid = Math.floor(route.points.length / 2);
            var mpt = latLonToPixel(route.points[mid].lat, route.points[mid].lon);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(mpt.x - 30, mpt.y - 10, 60, 20);
            ctx.fillStyle = '#333';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(route.distance.toFixed(0) + 'm', mpt.x, mpt.y + 4);
        });

        // 绘制正在绘制的路径
        if (currentPath.length > 0) {
            ctx.strokeStyle = '#ffd93d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            var first = latLonToPixel(currentPath[0].lat, currentPath[0].lon);
            ctx.moveTo(first.x, first.y);
            for (var i = 1; i < currentPath.length; i++) {
                var pt = latLonToPixel(currentPath[i].lat, currentPath[i].lon);
                ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // 绘制路径点
            currentPath.forEach(function(p, i) {
                var pt = latLonToPixel(p.lat, p.lon);
                ctx.fillStyle = i === 0 ? '#2ecc71' : (i === currentPath.length - 1 ? '#e74c3c' : '#ffd93d');
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制节点
        var nodeColors = {depot:'#e74c3c', pickup:'#f39c12', delivery:'#2ecc71'};
        Object.keys(nodes).forEach(function(id) {
            var n = nodes[id];
            var p = latLonToPixel(n.lat, n.lon);

            // 选中高亮
            if (selectedNodes.includes(id)) {
                ctx.fillStyle = 'rgba(255,255,0,0.5)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = nodeColors[n.type];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.font = '10px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(n.name, p.x + 10, p.y + 4);
        });
    }

    function setMode(m) {
        mode = m;
        selectedNodes = [];
        if (m === 'node') {
            modeIndicator.textContent = '🔗 节点连线 - 点击第一个节点，再点击第二个节点';
            modeIndicator.style.display = 'block';
            canvas.style.cursor = 'pointer';
        } else if (m === 'draw') {
            modeIndicator.textContent = '✏️ 绘制模式 - 点击添加路径点，右键完成';
            modeIndicator.style.display = 'block';
            canvas.style.cursor = 'crosshair';
        } else if (m === 'delete') {
            modeIndicator.textContent = '🗑️ 删除模式 - 点击路线删除';
            modeIndicator.style.display = 'block';
            canvas.style.cursor = 'pointer';
        } else {
            modeIndicator.style.display = 'none';
            canvas.style.cursor = 'default';
        }
        draw();
    }

    function findNearestNode(px, py) {
        var minDist = 20;
        var found = null;
        Object.keys(nodes).forEach(function(id) {
            var n = nodes[id];
            var p = latLonToPixel(n.lat, n.lon);
            var dist = Math.sqrt((px-p.x)*(px-p.x) + (py-p.y)*(py-p.y));
            if (dist < minDist) {
                minDist = dist;
                found = id;
            }
        });
        return found;
    }

    canvas.addEventListener('click', function(e) {
        var rect = canvas.getBoundingClientRect();
        var px = e.clientX - rect.left;
        var py = e.clientY - rect.top;
        var ll = pixelToLatLon(px, py);

        if (mode === 'auto') {
            // 自动模式：点击空白处添加拐点
            if (currentPath.length > 0) {
                // 找到最近的线段，在中间插入拐点
                var bestIdx = -1;
                var bestDist = 15;
                for (var i = 0; i < currentPath.length - 1; i++) {
                    var p1 = latLonToPixel(currentPath[i].lat, currentPath[i].lon);
                    var p2 = latLonToPixel(currentPath[i+1].lat, currentPath[i+1].lon);
                    var dist = pointToSegmentDistance(px, py, p1.x, p1.y, p2.x, p2.y);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestIdx = i + 1;
                    }
                }
                if (bestIdx >= 0) {
                    currentPath.splice(bestIdx, 0, {lat: ll.lat, lon: ll.lon});
                } else {
                    currentPath.push({lat: ll.lat, lon: ll.lon});
                }
                updateCurrentRouteInfo();
                draw();
            }
        } else if (mode === 'node') {
            // 检查是否点击了节点
            var nodeId = findNearestNode(px, py);
            if (nodeId) {
                selectedNodes.push(nodeId);
                if (selectedNodes.length === 1) {
                    // 第一个节点选中，开始绘制
                    var n = nodes[nodeId];
                    currentPath = [{lat: n.lat, lon: n.lon, name: n.name}];
                    modeIndicator.textContent = '✏️ 点击第二个节点，或点击地图添加拐点，右键完成';
                    draw();
                } else if (selectedNodes.length === 2) {
                    // 第二个节点选中，添加到路径
                    var n = nodes[nodeId];
                    currentPath.push({lat: n.lat, lon: n.lon, name: n.name});
                    modeIndicator.textContent = '✏️ 可以点击地图添加拐点，右键完成路线';
                    draw();
                }
            } else {
                // 点击地图空白处，添加拐点
                if (currentPath.length > 0) {
                    currentPath.push({lat: ll.lat, lon: ll.lon});
                    updateCurrentRouteInfo();
                    draw();
                }
            }
        } else if (mode === 'draw') {
            currentPath.push({lat: ll.lat, lon: ll.lon});
            updateCurrentRouteInfo();
            draw();
        } else if (mode === 'delete') {
            // 检查是否点击了路线
            for (var i = routes.length - 1; i >= 0; i--) {
                if (isPointNearRoute(px, py, routes[i])) {
                    routes.splice(i, 1);
                    selectedRoute = -1;
                    updateRouteList();
                    draw();
                    break;
                }
            }
        }
    });

    canvas.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        if (mode === 'auto' && currentPath.length >= 2) {
            // 自动模式右键：完成当前路线
            confirmRoute();
        } else if ((mode === 'node' || mode === 'draw') && currentPath.length >= 2) {
            // 手动模式右键：完成当前路线
            var dist = calculatePathDistance(currentPath);
            routes.push({
                points: currentPath.slice(),
                distance: dist
            });
            currentPath = [];
            selectedNodes = [];
            updateRouteList();
            updateCurrentRouteInfo();
            setMode('node');
            draw();
        }
    });

    // === 拖动功能 ===
    var dragging = false;
    var dragIndex = -1;

    canvas.addEventListener('mousedown', function(e) {
        if (mode !== 'auto' && mode !== 'node' && mode !== 'draw') return;
        if (currentPath.length === 0) return;

        var rect = canvas.getBoundingClientRect();
        var px = e.clientX - rect.left;
        var py = e.clientY - rect.top;

        // 检查是否点击了路径点
        for (var i = 0; i < currentPath.length; i++) {
            var p = latLonToPixel(currentPath[i].lat, currentPath[i].lon);
            var dist = Math.sqrt((px-p.x)*(px-p.x) + (py-p.y)*(py-p.y));
            if (dist < 10) {
                dragging = true;
                dragIndex = i;
                canvas.style.cursor = 'grabbing';
                break;
            }
        }
    });

    canvas.addEventListener('mousemove', function(e) {
        if (!dragging || dragIndex < 0) return;

        var rect = canvas.getBoundingClientRect();
        var px = e.clientX - rect.left;
        var py = e.clientY - rect.top;
        var ll = pixelToLatLon(px, py);

        currentPath[dragIndex].lat = ll.lat;
        currentPath[dragIndex].lon = ll.lon;
        updateCurrentRouteInfo();
        draw();
    });

    canvas.addEventListener('mouseup', function(e) {
        if (dragging) {
            dragging = false;
            dragIndex = -1;
            canvas.style.cursor = 'crosshair';
        }
    });

    function isPointNearRoute(px, py, route) {
        for (var i = 0; i < route.points.length - 1; i++) {
            var p1 = latLonToPixel(route.points[i].lat, route.points[i].lon);
            var p2 = latLonToPixel(route.points[i+1].lat, route.points[i+1].lon);
            var dist = pointToSegmentDistance(px, py, p1.x, p1.y, p2.x, p2.y);
            if (dist < 10) return true;
        }
        return false;
    }

    function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
        var dx = x2 - x1;
        var dy = y2 - y1;
        var t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / (dx*dx + dy*dy)));
        var projX = x1 + t * dx;
        var projY = y1 + t * dy;
        return Math.sqrt((px-projX)*(px-projX) + (py-projY)*(py-projY));
    }

    function calculatePathDistance(points) {
        var total = 0;
        for (var i = 1; i < points.length; i++) {
            var dlat = (points[i].lat - points[i-1].lat) * 111000;
            var dlon = (points[i].lon - points[i-1].lon) * 111000 * Math.cos(points[i].lat * Math.PI / 180);
            total += Math.sqrt(dlat*dlat + dlon*dlon);
        }
        return total;
    }

    function updateCurrentRouteInfo() {
        var info = document.getElementById('current-route-info');
        if (currentPath.length === 0) {
            info.innerHTML = '<p style="color:#999; font-size:11px;">点击"绘制模式"开始画线</p>';
        } else {
            var dist = currentPath.length > 1 ? calculatePathDistance(currentPath) : 0;
            info.innerHTML = '<div class="info-row"><span>路径点数</span><span>' + currentPath.length + '</span></div>' +
                '<div class="info-row"><span>当前距离</span><span>' + dist.toFixed(1) + 'm</span></div>' +
                '<p style="color:#999; font-size:10px; margin-top:5px;">右键完成绘制</p>';
        }
    }

    function updateRouteList() {
        var list = document.getElementById('route-list');
        if (routes.length === 0) {
            list.innerHTML = '<p style="color:#999; font-size:11px;">暂无路线</p>';
        } else {
            list.innerHTML = '';
            routes.forEach(function(route, idx) {
                var div = document.createElement('div');
                div.className = 'route-item' + (idx === selectedRoute ? ' selected' : '');
                div.innerHTML = '路线 ' + (idx + 1) + ': ' + route.points.length + '个点, ' + route.distance.toFixed(0) + 'm';
                div.onclick = function() {
                    selectedRoute = idx;
                    updateRouteList();
                    draw();
                };
                list.appendChild(div);
            });
        }
    }

    function saveRoutes() {
        var data = JSON.stringify(routes, null, 2);
        var blob = new Blob([data], {type: 'application/json'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'flight_routes.json';
        a.click();
    }

    function loadRoutes() {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = function(e) {
            var file = e.target.files[0];
            var reader = new FileReader();
            reader.onload = function(ev) {
                routes = JSON.parse(ev.target.result);
                updateRouteList();
                draw();
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function clearAll() {
        if (confirm('确定清空所有路线？')) {
            routes = [];
            currentPath = [];
            selectedRoute = -1;
            autoQueue = [];
            autoIndex = 0;
            updateRouteList();
            updateCurrentRouteInfo();
            draw();
        }
    }

    // === 自动模式 ===
    var autoQueue = []; // 待绘制的节点对
    var autoIndex = 0;

    function startAutoMode() {
        // 生成所有节点对
        var nodeIds = Object.keys(nodes);
        autoQueue = [];
        for (var i = 0; i < nodeIds.length; i++) {
            for (var j = i + 1; j < nodeIds.length; j++) {
                autoQueue.push({from: nodeIds[i], to: nodeIds[j]});
            }
        }
        autoIndex = 0;

        document.getElementById('auto-panel').style.display = 'block';
        mode = 'auto';
        modeIndicator.textContent = '🚀 自动模式 - 查看路线，点击确认或跳过';
        modeIndicator.style.display = 'block';

        showAutoRoute();
    }

    function showAutoRoute() {
        if (autoIndex >= autoQueue.length) {
            // 全部完成
            document.getElementById('auto-info').innerHTML = '<p style="color:#2ecc71;">✅ 全部完成！共 ' + routes.length + ' 条路线</p>';
            modeIndicator.style.display = 'none';
            return;
        }

        var pair = autoQueue[autoIndex];
        var n1 = nodes[pair.from];
        var n2 = nodes[pair.to];
        var dist = calculatePathDistance([
            {lat: n1.lat, lon: n1.lon},
            {lat: n2.lat, lon: n2.lon}
        ]);

        document.getElementById('auto-info').innerHTML =
            '<div class="info-row"><span>进度</span><span>' + (autoIndex + 1) + ' / ' + autoQueue.length + '</span></div>' +
            '<div class="info-row"><span>起点</span><span>' + n1.name + '</span></div>' +
            '<div class="info-row"><span>终点</span><span>' + n2.name + '</span></div>' +
            '<div class="info-row"><span>直线距离</span><span>' + dist.toFixed(0) + 'm</span></div>';

        // 在地图上高亮显示这条路线
        selectedNodes = [pair.from, pair.to];
        currentPath = [
            {lat: n1.lat, lon: n1.lon, name: n1.name},
            {lat: n2.lat, lon: n2.lon, name: n2.name}
        ];
        draw();
    }

    function confirmRoute() {
        if (autoIndex >= autoQueue.length || currentPath.length < 2) return;

        var pair = autoQueue[autoIndex];
        var dist = calculatePathDistance(currentPath);

        routes.push({
            points: currentPath.slice(),
            distance: dist,
            from: pair.from,
            to: pair.to
        });

        autoIndex++;
        currentPath = [];
        selectedNodes = [];
        updateRouteList();
        showAutoRoute();
    }

    function resetCurrentPath() {
        // 重置当前路线为直线
        if (autoIndex >= autoQueue.length) return;
        var pair = autoQueue[autoIndex];
        var n1 = nodes[pair.from];
        var n2 = nodes[pair.to];
        currentPath = [
            {lat: n1.lat, lon: n1.lon, name: n1.name},
            {lat: n2.lat, lon: n2.lon, name: n2.name}
        ];
        updateCurrentRouteInfo();
        draw();
    }

    function skipRoute() {
        autoIndex++;
        showAutoRoute();
    }

    function stopAutoMode() {
        autoIndex = autoQueue.length;
        document.getElementById('auto-panel').style.display = 'none';
        modeIndicator.style.display = 'none';
        selectedNodes = [];
        currentPath = [];
        mode = 'view';
        draw();
    }

    window.addEventListener('resize', resize);
    resize();
    </script>
</body>
</html>
