        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container { display: flex; height: 100vh; }
        #map { flex: 1; background: #e8f4f8; position: relative; }
        canvas { display: block; cursor: crosshair; }
        .sidebar {
            width: 350px;
            background: white;
            padding: 20px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: #666; margin-bottom: 15px; }
        .legend { margin-bottom: 15px; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-color { width: 14px; height: 14px; margin-right: 8px; border-radius: 50%; }
        .legend-line { width: 25px; height: 3px; margin-right: 8px; }
        .panel {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .panel h3 { font-size: 13px; margin-bottom: 8px; color: #333; }
        .info-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 12px; }
        .info-label { color: #666; }
        .info-value { font-weight: bold; }
        .select-hint { color: #e74c3c; font-size: 12px; margin-bottom: 10px; }
        .path-list { max-height: 300px; overflow-y: auto; }
        .path-item {
            padding: 8px;
            margin: 4px 0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            border: 1px solid #ddd;
        }
        .path-item:hover { border-color: #3498db; background: #f0f8ff; }
        .path-item.selected { border-color: #e74c3c; background: #fff5f5; }
        .comparison {
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #3498db;
        }
        .comparison h3 { color: #3498db; }
        .bar { height: 20px; border-radius: 3px; margin: 5px 0; }
        .bar-straight { background: #3498db; }
        .bar-actual { background: #e74c3c; }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            display: none;
            z-index: 100;
            max-width: 250px;
        }
    </style>
</head>

    function draw() {
        // 绘制卫星底图
        if (tileLoaded) {
            ctx.drawImage(tileImage, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = '#e8f4f8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 绘制建筑物（半透明红色，表示障碍物）
        buildings.forEach(function(b) {
            if (b.polygon && b.polygon.length > 2) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                var first = latLonToPixel(b.polygon[0][1], b.polygon[0][0]);
                ctx.moveTo(first.x, first.y);
                for (var i = 1; i < b.polygon.length; i++) {
                    var pt = latLonToPixel(b.polygon[i][1], b.polygon[i][0]);
                    ctx.lineTo(pt.x, pt.y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        });

        // 绘制所有走廊（灰色背景）
        corridors.forEach(function(c) {
            var n1 = nodes[c.from];
            var n2 = nodes[c.to];
            if (!n1 || !n2) return;
            var p1 = latLonToPixel(n1.lat, n1.lon);
            var p2 = latLonToPixel(n2.lat, n2.lon);
            ctx.strokeStyle = 'rgba(150,150,150,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        });

        // 绘制选中节点之间的路径
        if (selectedNodes.length === 2) {
            var c = findCorridor(selectedNodes[0], selectedNodes[1]);
            if (c) {
                // 直线路径（蓝色虚线）
                var n1 = nodes[selectedNodes[0]];
                var n2 = nodes[selectedNodes[1]];
                var p1 = latLonToPixel(n1.lat, n1.lon);
                var p2 = latLonToPixel(n2.lat, n2.lon);

                ctx.strokeStyle = '#3498db';
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 4]);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
                ctx.setLineDash([]);

                // A*实际路径（红色实线）
                if (c.path_latlon && c.path_latlon.length > 0) {
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    var first = latLonToPixel(c.path_latlon[0][1], c.path_latlon[0][0]);
                    ctx.moveTo(first.x, first.y);
                    for (var i = 1; i < c.path_latlon.length; i++) {
                        var pt = latLonToPixel(c.path_latlon[i][1], c.path_latlon[i][0]);
                        ctx.lineTo(pt.x, pt.y);
                    }
                    ctx.stroke();
                }

                // 直线距离标签
                var mx = (p1.x + p2.x) / 2;
                var my = (p1.y + p2.y) / 2 - 15;
                ctx.fillStyle = '#3498db';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('直线: ' + c.straight_distance_m + 'm', mx, my);

                // 实际距离标签
                ctx.fillStyle = '#e74c3c';
                ctx.fillText('实际: ' + c.route_distance_m + 'm', mx, my + 15);
            }
        }

        // 绘制节点
        var nodeColors = {depot:'#e74c3c', pickup:'#f39c12', delivery:'#2ecc71'};
        Object.keys(nodes).forEach(function(id) {
            var n = nodes[id];
            var p = latLonToPixel(n.lat, n.lon);

            // 选中高亮
            if (selectedNodes.includes(id)) {
                ctx.fillStyle = 'rgba(255,255,0,0.5)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = nodeColors[n.type];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#333';
            ctx.font = '11px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(n.name, p.x + 12, p.y + 4);
        });
    }

    function findCorridor(id1, id2) {
        for (var i = 0; i < corridors.length; i++) {
            var c = corridors[i];
            if ((c.from === id1 && c.to === id2) || (c.from === id2 && c.to === id1)) {
                return c;
            }
        }
        return null;
    }

    function findNearestNode(px, py) {
        var minDist = 20;
        var found = null;
        Object.keys(nodes).forEach(function(id) {
            var n = nodes[id];
            var p = latLonToPixel(n.lat, n.lon);
            var dist = Math.sqrt((px-p.x)*(px-p.x) + (py-p.y)*(py-p.y));
            if (dist < minDist) {
                minDist = dist;
                found = id;
            }
        });
        return found;
    }

    canvas.addEventListener('click', function(e) {
        var rect = canvas.getBoundingClientRect();
        var px = e.clientX - rect.left;
        var py = e.clientY - rect.top;
        var nodeId = findNearestNode(px, py);

        if (nodeId) {
            if (selectedNodes.length === 0) {
                selectedNodes.push(nodeId);
                document.getElementById('select-hint').textContent = '请点击第二个节点';
                document.getElementById('selected-info').innerHTML =
                    '<div style="padding:5px;background:#fff5f5;border-radius:4px;font-size:12px;">' +
                    '起点: <b>' + nodes[nodeId].name + '</b></div>';
            } else if (selectedNodes.length === 1) {
                if (nodeId !== selectedNodes[0]) {
                    selectedNodes.push(nodeId);
                    document.getElementById('select-hint').textContent = '已选择，点击其他节点重新选择';
                    document.getElementById('selected-info').innerHTML =
                        '<div style="padding:5px;background:#f0f8ff;border-radius:4px;font-size:12px;">' +
                        '起点: <b>' + nodes[selectedNodes[0]].name + '</b><br>' +
                        '终点: <b>' + nodes[selectedNodes[1]].name + '</b></div>';
                    showComparison();
                }
            } else {
                selectedNodes = [nodeId];
                document.getElementById('select-hint').textContent = '请点击第二个节点';
                document.getElementById('selected-info').innerHTML =
                    '<div style="padding:5px;background:#fff5f5;border-radius:4px;font-size:12px;">' +
                    '起点: <b>' + nodes[nodeId].name + '</b></div>';
                document.getElementById('comparison-panel').style.display = 'none';
            }
            draw();
        }
    });

    function showComparison() {
        var c = findCorridor(selectedNodes[0], selectedNodes[1]);
        var panel = document.getElementById('comparison-panel');
        var content = document.getElementById('comparison-content');

        if (!c) {
            panel.style.display = 'block';
            content.innerHTML = '<p style="color:#e74c3c;">这两点之间没有走廊</p>';
            return;
        }

        var maxDist = Math.max(c.straight_distance_m, c.route_distance_m);
        var straightW = (c.straight_distance_m / maxDist * 100);
        var routeW = (c.route_distance_m / maxDist * 100);
        var diff = c.route_distance_m - c.straight_distance_m;
        var diffPercent = (diff / c.straight_distance_m * 100).toFixed(1);

        panel.style.display = 'block';
        content.innerHTML =
            '<div class="info-row"><span class="info-label">直线距离</span><span class="info-value" style="color:#3498db;">' + c.straight_distance_m + 'm</span></div>' +
            '<div class="bar bar-straight" style="width:' + straightW + '%;"></div>' +
            '<div class="info-row"><span class="info-label">实际飞行距离</span><span class="info-value" style="color:#e74c3c;">' + c.route_distance_m + 'm</span></div>' +
            '<div class="bar bar-actual" style="width:' + routeW + '%;"></div>' +
            '<div class="info-row"><span class="info-label">绕行距离</span><span class="info-value">' + diff.toFixed(0) + 'm (+' + diffPercent + '%)</span></div>' +
            '<div class="info-row"><span class="info-label">绕行系数</span><span class="info-value">' + c.detour_ratio.toFixed(3) + '</span></div>' +
            '<div class="info-row"><span class="info-label">状态</span><span class="info-value">' + c.status + '</span></div>';
    }

    // 构建走廊列表
    var pathList = document.getElementById('path-list');
    corridors.forEach(function(c, idx) {
        var div = document.createElement('div');
        div.className = 'path-item';
        div.innerHTML = c.from_name + ' → ' + c.to_name +
            '<br>直线 ' + c.straight_distance_m + 'm | 实际 ' + c.route_distance_m + 'm | 绕行 ' + c.detour_ratio.toFixed(3);
        div.onclick = function() {
            selectedNodes = [c.from, c.to];
            document.getElementById('select-hint').textContent = '已选择，点击其他节点重新选择';
            document.getElementById('selected-info').innerHTML =
                '<div style="padding:5px;background:#f0f8ff;border-radius:4px;font-size:12px;">' +
                '起点: <b>' + c.from_name + '</b><br>终点: <b>' + c.to_name + '</b></div>';
            showComparison();
            draw();
        };
        pathList.appendChild(div);
    });

    window.addEventListener('resize', resize);
    resize();
    </script>
